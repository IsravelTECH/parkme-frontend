<script>
document.addEventListener("DOMContentLoaded", async () => {

  const urlParams = new URLSearchParams(window.location.search);
  const sessionId = urlParams.get("session_id");

  if (!sessionId) {
    alert("Invalid payment session");
    return;
  }

  try {
    const res = await fetch(`https://parkme-api.onrender.com/verify-payment/${sessionId}`);
    const result = await res.json();
    console.log(result); // 🔥 DEBUG

    if (!result.booking_details) {
      alert("Payment verification failed");
      return;
    }

    const data = result.booking_details;

    // ✅ Fill UI from backend (REAL DATA)
    document.getElementById("bookingId").innerText = data.booking_id;
    document.getElementById("parkingName").innerText = data.parking_name;
    document.getElementById("dateTime").innerText = `${data.date} • ${data.time}`;
    document.getElementById("locationText").innerText = data.location;
    document.getElementById("paymentMethod").innerText = data.payment_method;
    document.getElementById("amountPaid").innerText = `₹${data.amount_paid}`;

  } catch (err) {
    console.error(err);
    alert("Something went wrong");
  }
});

document.getElementById("goBookings").addEventListener("click", () => {
  window.location.href = "mybooking.html";
});

document.getElementById("goHome").addEventListener("click", () => {
  window.location.href = "index.html";
});

document.getElementById("downloadReceipt").addEventListener("click", () => {

  const data = JSON.parse(localStorage.getItem("bookingData"));
  if (!data) return alert("No booking data");

  const receipt = `
ParkMe Receipt
-----------------------
Parking: ${data.parking_name}
Address: ${data.parking_address}
Vehicle: ${data.vehicle_number}
Date: ${data.date}
Time: ${data.start_time} - ${data.end_time}
Amount: ₹${data.total}
-----------------------
Thank you!
`;

  const blob = new Blob([receipt], { type: "text/plain" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "receipt.txt";
  a.click();

  URL.revokeObjectURL(url);
});


document.getElementById("shareReceipt").addEventListener("click", async () => {

  const data = JSON.parse(localStorage.getItem("bookingData"));
  if (!data) return alert("No booking data");

  const text = `
🚗 ParkMe Booking
Location: ${data.parking_name}
Date: ${data.date}
Time: ${data.start_time} - ${data.end_time}
Amount: ₹${data.total}
`;

  if (navigator.share) {
    await navigator.share({
      title: "My Parking Booking",
      text: text
    });
  } else {
    alert("Sharing not supported on this browser");
  }

});


</script>
