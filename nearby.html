<script>
/* ================= MAP SETUP ================= */

let map;
let markersLayer = L.layerGroup();

function initMap() {
  map = L.map('map').setView([13.0418, 80.2341], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
  }).addTo(map);

  markersLayer.addTo(map);

  // Load default nearby (Chennai center)
  loadNearby(13.0418, 80.2341);
}


/* ================= LOAD NEARBY ================= */

async function loadNearby(lat, lng) {
  try {
    const res = await fetch(`http://localhost:8000/nearby?lat=${lat}&lng=${lng}`);
    const data = await res.json();

    const listingsGrid = document.getElementById("listings-grid");

    // Clear UI + markers
    listingsGrid.innerHTML = "";
    markersLayer.clearLayers();

    if (!data.results || data.results.length === 0) {
      listingsGrid.innerHTML = `<p class="text-gray-500">No parking found nearby</p>`;
      return;
    }

    data.results.forEach(place => {

      // Add marker
      L.marker([place.lat, place.lng])
        .addTo(markersLayer)
        .bindPopup(`<b>${place.name}</b><br>₹${place.price_per_hour}/hr`);

      // Add card
      listingsGrid.innerHTML += `
  <div class="parking-card bg-white rounded-2xl border border-gray-100 overflow-hidden">

    <img src="https://source.unsplash.com/400x200/?parking"
         class="w-full h-40 object-cover" />

    <div class="p-4">
      <h3 class="font-bold text-lg">${place.name}</h3>

      <p class="text-xs text-gray-500 flex items-center gap-1 mt-1">
        <i class="fas fa-location-dot text-blue-500"></i>
        ${place.address}
      </p>

      <!-- ✅ ADD THIS -->
      <p class="text-sm text-green-600 font-semibold mt-1">
        Available Slots: ${place.available_slots ?? 0}
      </p>

      <p class="text-sm text-gray-500 mt-2">
        ₹${place.price_per_hour}/hr
      </p>

      <p class="text-xs text-gray-400">
        ${(place.distance / 1000).toFixed(2)} km away
      </p>

      <button onclick="openBookingModal('${place.name}', ${place.price_per_hour})"
        class="mt-4 w-full px-4 py-2 bg-blue-600 text-white rounded-lg">
        Book Now
      </button>
    </div>

  </div>
`;
    });

  } catch (err) {
    console.error("Error loading nearby:", err);
  }
}


/* ================= GET CURRENT LOCATION ================= */

function getLocation() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition((position) => {
      const lat = position.coords.latitude;
      const lon = position.coords.longitude;

      map.setView([lat, lon], 15);

      markersLayer.clearLayers();

      L.circle([lat, lon], {
        radius: 100,
        color: '#1e3a8a'
      }).addTo(markersLayer);

      // Load nearby from backend
      loadNearby(lat, lon);

    }, () => {
      alert("Location access denied");
    });
  }
}


/* ================= BOOKING ================= */

let currentRate = 0;

function openBookingModal(name, rate) {
  document.getElementById('bookingModal').classList.remove('hidden');
  document.getElementById('modalParkingName').innerText = name;
  currentRate = rate;
  calculateTotal();
}

function closeBookingModal() {
  document.getElementById('bookingModal').classList.add('hidden');
}

function calculateTotal() {
  const start = document.getElementById('startTime').value;
  const end = document.getElementById('endTime').value;

  if (start && end) {
    const startH = parseInt(start.split(':')[0]);
    const startM = parseInt(start.split(':')[1]);
    const endH = parseInt(end.split(':')[0]);
    const endM = parseInt(end.split(':')[1]);

    const duration = (endH + endM/60) - (startH + startM/60);

    if (duration > 0) {
      const total = Math.ceil(duration * currentRate);
      document.getElementById('estimatedTotal').innerText = `₹${total}`;
    } else {
      document.getElementById('estimatedTotal').innerText = `₹0`;
    }
  }
}


/* ================= PROFILE ================= */

function loadProfileUI() {
  const token = localStorage.getItem("token");
  const username = localStorage.getItem("username");

  const profileSection = document.getElementById("profileSection");
  const profileIcon = document.getElementById("profileIcon");

  if (token && username) {

    if (profileSection) {
      profileSection.classList.remove("hidden");
      profileSection.classList.add("flex");
    }

    if (profileIcon) {
      profileIcon.innerText = username.charAt(0).toUpperCase();

      profileIcon.onclick = () => {
        window.location.href = "profile.html";
      };
    }
  }
}


/* ================= INIT ================= */

document.addEventListener("DOMContentLoaded", () => {
  initMap();
  loadProfileUI();
});
</script>
