<script>
/* ================= MAP SETUP ================= */
let allParkings = []; // store all results
let map;
let markersLayer = L.layerGroup();

function initMap() {
  map = L.map('map').setView([13.0418, 80.2341], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
  }).addTo(map);

  markersLayer.addTo(map);

  // Load default nearby (Chennai center)
  loadNearby(13.0418, 80.2341);
}

function showError(msg) {
  const div = document.createElement("div");
  div.innerText = msg;
  div.className = "fixed top-5 right-5 bg-red-500 text-white px-4 py-2 rounded shadow z-[3000]";
  document.body.appendChild(div);

  setTimeout(() => div.remove(), 3000);
}



/* ================= LOAD NEARBY ================= */

async function loadNearby(lat, lng) {
  try {
    const res = await fetch(`https://parkme-backend.onrender.com/nearby?lat=${lat}&lng=${lng}`);
    const data = await res.json();

    if (!data.results || data.results.length === 0) {
      document.getElementById("listings-grid").innerHTML =
        `<p class="text-gray-500">No parking found nearby</p>`;
      return;
    }

    allParkings = data.results;

    // 🔥 USE render function
    renderParkings(allParkings);

  } catch (err) {
    console.error("Error loading nearby:", err);
  }
}


/* ================= GET CURRENT LOCATION ================= */

function getLocation() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition((position) => {
      const lat = position.coords.latitude;
      const lon = position.coords.longitude;

      map.setView([lat, lon], 15);

      markersLayer.clearLayers();

      L.circle([lat, lon], {
        radius: 100,
        color: '#1e3a8a'
      }).addTo(markersLayer);

      // Load nearby from backend
      loadNearby(lat, lon);

    }, () => {
      alert("Location access denied");
    });
  }
}


/* ================= BOOKING ================= */

let selectedParking = null;

function openBookingModal(place) {
  document.getElementById('bookingModal').classList.remove('hidden');

  document.getElementById('modalParkingName').innerText = place.name;
  document.getElementById("modalParkingName").innerText =
  `${place.name} (${place.available_slots} slots left)`;

    // ✅ ADD HERE
  document.getElementById("availableDaysText").innerText =
    place.available_days.join(", ");

  selectedParking = place;
  currentRate = place.price_per_hour;

  renderSlotDays(place.available_days);

  calculateTotal();
}

function closeBookingModal() {
  document.getElementById('bookingModal').classList.add('hidden');
}

function calculateTotal() {
  const start = document.getElementById('startTime').value;
  const end = document.getElementById('endTime').value;

  if (start && end) {
    const startH = parseInt(start.split(':')[0]);
    const startM = parseInt(start.split(':')[1]);
    const endH = parseInt(end.split(':')[0]);
    const endM = parseInt(end.split(':')[1]);

    const duration = (endH + endM/60) - (startH + startM/60);

    if (duration > 0) {
      const total = Math.ceil(duration * currentRate);
      document.getElementById('estimatedTotal').innerText = total;
    } else {
      document.getElementById('estimatedTotal').innerText = `0`;
    }
  }
}


function renderParkings(list) {
  const listingsGrid = document.getElementById("listings-grid");

  listingsGrid.innerHTML = "";
  markersLayer.clearLayers(); // clear old markers

  list.forEach(place => {

    listingsGrid.innerHTML += `
      <div class="parking-card bg-white rounded-2xl border border-gray-100 overflow-hidden">

        <img src="https://parkme-backend.onrender.com/${place.image}"
             class="w-full h-30 object-cover" />

        <div class="p-4">
          <h3 class="font-bold text-lg">${place.name}</h3>

          <p class="text-xs text-gray-500 flex items-center gap-1 mt-1">
            <i class="fas fa-location-dot text-blue-500"></i>
            ${place.address}
          </p>

          <!-- FEATURES -->
          <div class="flex flex-wrap gap-2 mt-2">
            ${(place.features || []).map(f => {
              let icon = "fa-check";
              if (f.includes("CCTV")) icon = "fa-video";
              if (f.includes("EV")) icon = "fa-bolt";
              if (f.includes("Family")) icon = "fa-users";

              return `
                <span class="text-xs bg-blue-100 text-blue-700 px-2 py-1 rounded-full flex items-center gap-1">
                  <i class="fas ${icon}"></i> ${f}
                </span>
              `;
            }).join("")}
          </div>

          <!-- AVAILABLE DAYS -->
          <p class="text-xs text-gray-500 mt-2">
            <i class="fas fa-calendar-alt text-blue-500"></i>
            Available: ${(place.available_days || []).join(", ")}
          </p>

          <p class="text-sm text-green-600 mt-2">
            Available Days: <span id="availableDaysText"></span>
          </p>

          <p class="text-lg text-gray-500 mt-2">
  ₹${place.price_per_hour}/hr
</p>

<!-- 🆕 Available Slots -->
<p class="text-sm mt-1 ${
  place.available_slots === 0 
    ? "text-red-500 font-semibold" 
    : "text-green-600 font-semibold"
}">
  ${
    place.available_slots === 0
      ? "❌ Full"
      : `🅿️ ${place.available_slots} slots available`
  }
</p>

          <p class="text-xs text-gray-400">
            ${(place.distance / 1000).toFixed(2)} km away
          </p>

          <button 
  ${place.available_slots === 0 ? "disabled" : ""}
  onclick='openBookingModal(${JSON.stringify(place)})'
  class="mt-4 w-full px-4 py-2 rounded-lg 
  ${place.available_slots === 0 
    ? "bg-gray-300 text-gray-500 cursor-not-allowed" 
    : "bg-blue-600 text-white"}">
  ${
  place.available_slots === 0
    ? "Parking Full"
    : `Book Now (${place.available_slots})`
}
</button>
        </div>
      </div>
    `;

    // Add marker
    if (place.lat && place.lng) {
      L.marker([place.lat, place.lng])
        .addTo(markersLayer)
        .bindPopup(`
          <strong>${place.name}</strong><br/>
          ${place.address}<br/>
          ₹${place.price_per_hour}/hr
        `);
    }
  });
}



/* ================= PROFILE ================= */

function loadProfileUI() {
  const token = localStorage.getItem("token");
  const username = localStorage.getItem("username");
  const profileImage = localStorage.getItem("profileImage"); // ✅ get image

  const profileSection = document.getElementById("profileSection");
  const profileIcon = document.getElementById("profileIcon");

  if (token && username) {

    // Show section
    if (profileSection) {
      profileSection.classList.remove("hidden");
      profileSection.classList.add("flex");
    }

    // 🔥 If image exists → show image
    if (profileImage && profileImage !== "null") {
      profileIcon.innerHTML = `
        <img src="${profileImage}" 
             class="w-10 h-10 rounded-full object-cover border cursor-pointer" />
      `;
    } 
    // 🔥 Else → show initial
    else {
      profileIcon.innerText = username.charAt(0).toUpperCase();
    }

    // Click → profile page
    profileIcon.onclick = () => {
      window.location.href = "profile.html";
    };
  }
}



let searchTimeout;

document.getElementById("searchInput").addEventListener("input", function () {
  const query = this.value.trim();

  clearTimeout(searchTimeout);

  // ⏳ debounce (avoid too many API calls)
  searchTimeout = setTimeout(() => {

    if (query.length === 0) {
      renderParkings(allParkings); // show default
      return;
    }

    searchFromDB(query);

  }, 500);
});


async function searchFromDB(query) {
  try {
    const res = await fetch(`https://parkme-backend.onrender.com/search?query=${encodeURIComponent(query)}`);
    const data = await res.json();

    if (!data.results || data.results.length === 0) {
      document.getElementById("listings-grid").innerHTML =
        `<p class="text-gray-500">No parking found</p>`;
      return;
    }

    renderParkings(data.results);

  } catch (err) {
    console.error("Search error:", err);
  }
}

function getDayName(dateString) {
  const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

function formatTime(time) {
  const [h, m] = time.split(":");
  let hour = parseInt(h);
  const ampm = hour >= 12 ? "PM" : "AM";
  hour = hour % 12 || 12;
  return `${hour}:${m} ${ampm}`;
}


function startCountdown(endTime) {
  const el = document.getElementById("countdown");

  setInterval(() => {
    const now = new Date();
    const end = new Date(endTime);

    const diff = end - now;

    if (diff <= 0) {
      el.innerText = "Expired";
      return;
    }

    const mins = Math.floor(diff / 60000);
    const secs = Math.floor((diff % 60000) / 1000);

    el.innerText = `${mins}m ${secs}s`;
  }, 1000);
}

function applyFilters() {

  const maxPrice = parseInt(document.getElementById("priceFilter").value);
  const startTime = document.getElementById("filterStartTime").value;
  const endTime = document.getElementById("filterEndTime").value;

  const selectedFeatures = Array.from(
    document.querySelectorAll(".filter-feature:checked")
  ).map(el => el.value.toLowerCase());

  const filtered = allParkings.filter(p => {

    // ✅ Price filter
    if (p.price_per_hour > maxPrice) return false;

    // ✅ Feature filter
    if (selectedFeatures.length > 0) {
      const features = (p.features || []).join(" ").toLowerCase();

      for (let f of selectedFeatures) {
        if (!features.includes(f)) return false;
      }
    }

    // ✅ Time filter (basic logic)
    if (startTime && endTime) {
      const s = parseInt(startTime.split(":")[0]);
      const e = parseInt(endTime.split(":")[0]);

      if (e <= s) return false; // invalid time
    }

    return true;
  });

  renderParkings(filtered);
}

function resetFilters() {
  document.getElementById("priceFilter").value = 250;
  document.getElementById("filterStartTime").value = "";
  document.getElementById("filterEndTime").value = "";

  document.querySelectorAll(".filter-feature")
    .forEach(cb => cb.checked = false);

  renderParkings(allParkings);
}

document.getElementById("bookingDate").addEventListener("input", function () {

  if (!selectedParking) return;

  const selectedDate = this.value;
  if (!selectedDate) return;

  const daysFull = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const daysShort = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  const dateObj = new Date(selectedDate);

  const fullDay = daysFull[dateObj.getDay()];
  const shortDay = daysShort[dateObj.getDay()];

  const availableDays = selectedParking.available_days || [];

  // ✅ Show selected day
  document.getElementById("selectedDayText").innerText =
    `Selected Day: ${fullDay}`;

  // ❌ Not available
  if (!availableDays.includes(shortDay)) {

    showError(`${fullDay} is NOT available ❌`);

    this.value = "";
    document.getElementById("selectedDayText").innerText = "";

    return;
  }

  // ✅ Auto-select matching radio
  const radios = document.querySelectorAll('input[name="slotDay"]');

  radios.forEach(r => {
    r.checked = (r.value === shortDay);
  });
});
