<script data-purpose="particle-generator">document.addEventListener('DOMContentLoaded', () => {
      const container = document.getElementById('particle-container');
      const particleCount = 50;

      for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        
        const x = Math.random() * 100;
        const y = Math.random() * 100;
        const size = Math.random() * 4 + 2;
        const delay = Math.random() * -20;
        const duration = 15 + Math.random() * 15;
        
        particle.style.left = `${x}%`;
        particle.style.top = `${y}%`;
        particle.style.width = `${size}px`;
        particle.style.height = `${size}px`;
        particle.style.opacity = Math.random() * 0.2 + 0.1;
        particle.style.animationDuration = `${duration}s`;
        particle.style.animationDelay = `${delay}s`;
        
        container.appendChild(particle);
      }
    });</script>
<script data-purpose="ui-interactions">
    function togglePassword(id) {
      const input = document.getElementById(id);
      if (input.type === "password") {
        input.type = "text";
      } else {
        input.type = "password";
      }
    }

  </script>
<!-- END: Logic Scripts -->
<script>
    const passwordInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirm-password');
    const strengthBar = document.getElementById('strength-bar');
    const strengthText = document.getElementById('strength-text').querySelector('span');

    passwordInput.addEventListener('input', () => {
      const val = passwordInput.value;
      let strength = 0;

      if (val.length >= 6) strength++;
      if (val.length >= 10) strength++;
      if (/[0-9]/.test(val)) strength++;
      if (/[!@#$%^&*(),.?":{}|<>]/.test(val)) strength++;

      updateStrengthMeter(strength, val.length === 0);
    });

    function updateStrengthMeter(strength, isEmpty) {
      if (isEmpty) {
        strengthBar.style.width = '0%';
        strengthText.innerText = 'None';
        strengthText.className = 'text-slate-500';
        return;
      }

      const states = [
        { label: 'Weak', width: '25%', color: 'bg-red-500', textColor: 'text-red-600' },
        { label: 'Fair', width: '50%', color: 'bg-orange-500', textColor: 'text-orange-600' },
        { label: 'Good', width: '75%', color: 'bg-emerald-400', textColor: 'text-emerald-600' },
        { label: 'Strong', width: '100%', color: 'bg-blue-800', textColor: 'text-blue-900' }
      ];

      const state = states[Math.min(strength, states.length - 1)];
      
      strengthBar.style.width = state.width;
      strengthBar.className = `h-full transition-all duration-300 ${state.color}`;
      strengthText.innerText = state.label;
      strengthText.className = state.textColor;
    }

  </script>
  
<script>
const form = document.querySelector("form");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const phone = document.getElementById("phone").value;
  const password = document.getElementById("password").value;
  const confirmPassword = document.getElementById("confirm-password").value;

  if (password !== confirmPassword) {
    alert("Passwords do not match");
    return;
  }

  try {

    const response = await fetch("http://127.0.0.1:8000/signup", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name: name,
        email: email,
        phone: phone,
        password: password
      })
    });

    const data = await response.json();

    if (response.ok) {

  alert("Account created successfully!");

  // ✅ Save token (IMPORTANT)
  if(data.token){
    localStorage.setItem("token", data.token);
  }

  // ✅ Save username (use backend if available)
  localStorage.setItem("username", data.name || name);

  // ✅ Redirect (this triggers navbar update automatically)
  window.location.href = "index.html";
} else {
      alert(data.detail || "Signup failed");
    }

  } catch (error) {
    alert("Server error");
  }
});

</script>
