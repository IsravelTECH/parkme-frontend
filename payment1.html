<script data-purpose="ui-handlers">
    function toggleMethod(method) {
      const cards = document.querySelectorAll('.method-card');
      cards.forEach(card => {
        if (card.dataset.method === method) {
          card.classList.add('active');
          const arrow = card.querySelector('svg');
          if (arrow) arrow.style.transform = 'rotate(180deg)';
        } else {
          card.classList.remove('active');
          const arrow = card.querySelector('svg');
          if (arrow) arrow.style.transform = 'rotate(0deg)';
        }
      });
    }

    // Initialize arrows on load
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.method-card').forEach(card => {
        const arrow = card.querySelector('svg');
        if (card.classList.contains('active')) {
          arrow.style.transform = 'rotate(180deg)';
        }
      });
    });
  </script>
<!-- END: Interactive Logic -->
<script src="https://js.stripe.com/v3/"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const booking = JSON.parse(localStorage.getItem("bookingData"));

  if (!booking) {
    alert("No booking data found");
    return;
  }

  console.log("Booking:", booking); // 🔍 debug

  const summary = document.getElementById("summary-card");

  summary.innerHTML = `
    <div class="bg-parkme-bg/50 rounded-xl border p-5 space-y-4">
      <h2 class="text-xs font-bold text-parkme-primary uppercase">Reservation Summary</h2>

      <div class="flex justify-between">
        <span>Location</span>
        <span class="font-semibold">${booking.parking_name}</span>
      </div>

      <div class="flex justify-between">
        <span>Address</span>
        <span class="font-semibold">${booking.parking_address}</span>
      </div>

      <div class="flex justify-between">
        <span>Vehicle</span>
        <span class="font-semibold">${booking.vehicle_number}</span>
      </div>

      <div class="flex justify-between">
        <span>Date</span>
        <span class="font-semibold">${booking.date}</span>
      </div>

      <div class="flex justify-between">
        <span>Time</span>
        <span class="font-semibold">${booking.start_time} - ${booking.end_time}</span>
      </div>

      <div class="flex justify-between pt-3 border-t">
        <span class="font-bold">Total</span>
        <span class="font-bold text-blue-600">₹${booking.total}</span>
      </div>
    </div>

    <div class="flex gap-3 mt-4">
      <button id="cancelBtn"
        class="w-1/2 bg-gray-200 text-gray-700 py-3 rounded font-bold">
        Cancel
      </button>

      <button id="payNowBtn"
        class="w-1/2 bg-blue-600 text-white py-3 rounded font-bold">
        Confirm & Pay
      </button>
    </div>
  `;

  const stripe = Stripe("pk_test_51RZu0JRhETa6xdVHdqX8dJsFXxfLb6Gba2eDBWFgjBAK9oMxNt69OxAGqjDLy9NOOMXDKTC203V1j3C09DZAp6Nx00nMGoEUGY");
  // ✅ PAY BUTTON
  document.getElementById("payNowBtn").addEventListener("click", async () => {
    try {

      const total = parseInt(booking.total || 0);

      if (total < 50) {
        alert("Minimum payment is ₹50");
        return;
      }

      const res = await fetch("https://parkme-backend.onrender.com/create-checkout-session", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          booking_id: booking.booking_id   // ✅ only send ID
        })
      });

      const data = await res.json();

      if (!data.id) {
        alert("Payment session failed");
        return;
      }

      await stripe.redirectToCheckout({
        sessionId: data.id
      });

    } catch (err) {
      console.error(err);
      alert("Payment failed");
    }
  });

  // ✅ CANCEL
  document.getElementById("cancelBtn").addEventListener("click", () => {
    window.location.href = "nearby.html";
  });

});
</script>
